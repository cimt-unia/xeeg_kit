[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xeeg_kit"
version = "0.1.0"
description = "Preprocessing toolkit for BEL EEG System One (280-channel HD-EEG)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "mne>=1.4",
    "meegkit",
    "mne-icalabel",
    "numpy",
    "scipy",
    "joblib"
]